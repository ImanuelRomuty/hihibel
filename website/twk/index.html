<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TWK — Tes Wawasan Kebangsaan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/app.css">
</head>
<body data-section="twk">
  <div class="page-wrap">
    <header class="site-header">
      <div class="header-inner">
        <a href="../index.html" class="site-logo">Hihibel<span>belajar ringkas</span></a>
        <div class="header-right">
          <nav class="header-nav" id="headerNav"></nav>
          <div class="header-auth" id="headerAuth"></div>
          <button class="menu-toggle" id="menuToggle" aria-label="Menu">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
        </div>
      </div>
    </header>

    <main class="container hub-main">
      <nav class="breadcrumb">
        <a href="../index.html">Beranda</a><span>/</span><span class="current">TWK</span>
      </nav>

      <header class="page-header reveal">
        <p class="page-eyebrow">Subtes 2</p>
        <h1>Tes Wawasan Kebangsaan</h1>
        <p>Nasionalisme, integritas, bela negara, dan pilar negara.</p>
        <div class="page-stats" id="pageStats"></div>
      </header>

      <div id="subbabRoot"></div>
    </main>

    <footer class="site-footer"><p>Hihibel · TWK</p></footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/admin-auth.js"></script>
  <script src="../js/site-nav.js"></script>
  <script src="../js/site-auth.js"></script>
  <script src="../js/soal-service.js"></script>
  <script src="../js/site-structure.js"></script>
  <script src="../js/app.js"></script>
  <script>
    SiteNav.init();
    (async () => {
      const session = await SiteAuth.init();
      let counts = {};
      if (session) {
        try {
          const stats = await SoalService.fetchStats();
          counts = Object.fromEntries(stats.map(s => [s.sub_bab, s.count]));
        } catch (_) {}
      }
      renderSubbabPage('twk', counts);
    })();
  </script>
</body>
</html>
