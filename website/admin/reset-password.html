<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Hihibel Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/app.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
  <div class="admin-wrap">
    <header class="site-header">
      <div class="header-inner">
        <a href="../index.html" class="site-logo">Hihibel<span>admin</span></a>
      </div>
    </header>

    <main class="admin-main">
      <div class="admin-card" style="max-width:420px;margin:40px auto">
        <h1>Password Baru</h1>
        <p class="subtitle">Masukkan password admin yang baru.</p>

        <div id="alertBox"></div>
        <div id="loadingMsg" class="subtitle">Memverifikasi link reset...</div>

        <form class="admin-form" id="resetForm" hidden>
          <div class="field">
            <label for="password">Password baru</label>
            <input type="password" id="password" required minlength="6" autocomplete="new-password">
          </div>
          <div class="field">
            <label for="password2">Ulangi password</label>
            <input type="password" id="password2" required minlength="6" autocomplete="new-password">
          </div>
          <div class="admin-actions" style="border:none;padding-top:0;margin-top:8px">
            <button type="submit" class="btn-admin primary" style="width:100%">Simpan Password</button>
          </div>
        </form>

        <p style="margin-top:20px;font-size:0.82rem">
          <a href="login.html">← Kembali ke login</a>
        </p>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/admin-auth.js"></script>
  <script>
    (async () => {
      const alertBox = document.getElementById('alertBox');
      const loadingMsg = document.getElementById('loadingMsg');
      const form = document.getElementById('resetForm');

      const cfgErr = HihibelDB.configError?.();
      if (cfgErr) {
        loadingMsg.hidden = true;
        alertBox.innerHTML = `<div class="alert alert-error">${cfgErr}</div>`;
        return;
      }

      try {
        const session = await AdminAuth.waitForRecoverySession();
        loadingMsg.hidden = true;
        if (!session) {
          alertBox.innerHTML = `<div class="alert alert-error">Link reset tidak valid atau sudah kadaluarsa. Minta link baru dari halaman login.</div>`;
          return;
        }
        form.hidden = false;
      } catch (err) {
        loadingMsg.hidden = true;
        alertBox.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
        return;
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const pw = document.getElementById('password').value;
        const pw2 = document.getElementById('password2').value;
        if (pw !== pw2) {
          alertBox.innerHTML = `<div class="alert alert-error">Password tidak sama.</div>`;
          return;
        }
        const btn = form.querySelector('button');
        btn.disabled = true;
        btn.textContent = 'Menyimpan...';
        try {
          await AdminAuth.updatePassword(pw);
          alertBox.innerHTML = `<div class="alert alert-success">Password berhasil diubah. Redirect ke login...</div>`;
          setTimeout(() => { location.href = 'login.html'; }, 1500);
        } catch (err) {
          alertBox.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
          btn.disabled = false;
          btn.textContent = 'Simpan Password';
        }
      });
    })();
  </script>
</body>
</html>
