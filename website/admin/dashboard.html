<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Admin — Hihibel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/app.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
  <div class="admin-shell">
    <aside class="admin-sidebar">
      <a href="../index.html" class="admin-sidebar-logo">Hihibel<span>admin</span></a>
      <nav class="admin-sidebar-nav">
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="buat-soal.html">+ Buat Soal</a>
        <a href="../twk/latihan.html" target="_blank">Preview TWK</a>
        <a href="../tiu/latihan-skd.html" target="_blank">Preview TIU</a>
        <a href="../tkp/latihan.html" target="_blank">Preview TKP</a>
        <a href="../tiu/latihan-kecepatan.html" target="_blank">Preview Kecepatan</a>
      </nav>
      <div class="admin-sidebar-foot">
        <span id="userEmail"></span>
        <button class="btn-sm" id="btnLogout">Keluar</button>
      </div>
    </aside>

    <main class="admin-content">
      <header class="admin-page-header">
        <div>
          <h1>Dashboard</h1>
          <p>Kelola bank soal — import tryout & latihan kecepatan.</p>
        </div>
      </header>

      <div id="alertBox"></div>

      <div class="admin-stats" id="statsGrid"></div>

      <div class="admin-card">
        <div class="admin-toolbar">
          <div class="admin-tabs" id="subBabTabs"></div>
          <div class="admin-toolbar-actions">
            <label class="btn-admin secondary" style="cursor:pointer">
              Import JSON
              <input type="file" id="fileImport" accept=".json" hidden>
            </label>
            <button class="btn-admin secondary" id="btnImportSeed">Seed Kecepatan</button>
            <a href="buat-soal.html" class="btn-admin primary">+ Buat Soal</a>
          </div>
        </div>

        <div class="admin-subbar">
          <p id="subBabDesc" class="subtitle" style="margin:0"></p>
          <button class="btn-sm danger" id="btnClearSubBab" hidden>Hapus semua di paket ini</button>
        </div>

        <div id="tableWrap">
          <div class="loading-state">Memuat soal...</div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/paket-config.js"></script>
  <script src="../js/soal-service.js"></script>
  <script src="../js/admin-auth.js"></script>
  <script src="../js/questions-kecepatan.js"></script>
  <script src="../js/admin-dashboard.js"></script>
</body>
</html>
