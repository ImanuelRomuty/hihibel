<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Hihibel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/app.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
  <div class="admin-wrap">
    <header class="site-header">
      <div class="header-inner">
        <a href="../index.html" class="site-logo">Hihibel<span>admin</span></a>
      </div>
    </header>

    <main class="admin-main">
      <div class="admin-card" style="max-width:420px;margin:40px auto">
        <h1>Login Admin</h1>
        <p class="subtitle">Hanya admin yang bisa buat dan edit soal.</p>

        <div id="alertBox"></div>

        <form class="admin-form" id="loginForm">
          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" required autocomplete="email" placeholder="admin@email.com">
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" required autocomplete="current-password">
          </div>
          <div class="admin-actions" style="border:none;padding-top:0;margin-top:8px">
            <button type="submit" class="btn-admin primary" style="width:100%">Masuk</button>
          </div>
        </form>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/admin-auth.js"></script>
  <script>
    (async () => {
      const params = new URLSearchParams(location.search);
      const alertBox = document.getElementById('alertBox');

      if (params.get('error') === 'config') {
        alertBox.innerHTML = '<div class="alert alert-error">Supabase belum dikonfigurasi. Isi <code>js/config.js</code> atau set env vars di Netlify.</div>';
      }

      if (HihibelDB.isConfigured()) {
        const session = await AdminAuth.getSession();
        if (session) location.href = 'dashboard.html';
      }

      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.disabled = true;
        btn.textContent = 'Memproses...';
        try {
          await AdminAuth.login(
            document.getElementById('email').value.trim(),
            document.getElementById('password').value
          );
          location.href = 'dashboard.html';
        } catch (err) {
          alertBox.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
          btn.disabled = false;
          btn.textContent = 'Masuk';
        }
      });
    })();
  </script>
</body>
</html>
