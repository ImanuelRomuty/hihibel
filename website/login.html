<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk — Hihibel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="css/admin.css">
  <style>
    .login-wrap { max-width: 420px; margin: 48px auto; padding: 0 20px 80px; }
    .login-card { background: var(--bg-white); border: 1px solid var(--border); border-radius: var(--radius); padding: 36px 32px; box-shadow: var(--shadow-sm); }
    .login-card h1 { font-family: var(--font-serif); font-size: 1.5rem; margin-bottom: 8px; color: var(--heading); }
    .login-note { font-size: 0.82rem; color: var(--text-light); margin-top: 20px; text-align: center; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="site-logo">Hihibel<span>belajar ringkas</span></a>
    </div>
  </header>

  <main class="login-wrap">
    <div class="login-card">
      <h1>Masuk ke Hihibel</h1>
      <p class="subtitle">Website hanya untuk member yang sudah punya akun.</p>
      <div id="alertBox"></div>
      <form class="admin-form" id="loginForm">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email" placeholder="email@example.com">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-admin primary" style="width:100%;margin-top:8px">Masuk</button>
      </form>
      <p class="login-note">Belum punya akun? Minta admin membuatkan user di Supabase.</p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/admin-auth.js"></script>
  <script src="js/site-auth.js"></script>
  <script>
    (async () => {
      const params = new URLSearchParams(location.search);
      const alertBox = document.getElementById('alertBox');
      const next = params.get('next') || 'index.html';

      if (!HihibelDB.isConfigured()) {
        alertBox.innerHTML = `<div class="alert alert-error">${HihibelDB.configError()}</div>`;
        return;
      }

      const session = await SiteAuth.waitForSession(2000);
      if (session) {
        location.replace(decodeURIComponent(next));
        return;
      }

      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.disabled = true;
        btn.textContent = 'Memproses...';
        alertBox.innerHTML = '';
        try {
          await SiteAuth.login(
            document.getElementById('email').value.trim(),
            document.getElementById('password').value
          );
          location.replace(decodeURIComponent(next));
        } catch (err) {
          alertBox.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
          btn.disabled = false;
          btn.textContent = 'Masuk';
        }
      });
    })();
  </script>
</body>
</html>
