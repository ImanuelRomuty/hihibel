[build]
  command = "node scripts/generate-config.js"
  publish = "."

[[redirects]]
  from = "/admin"
  to = "/admin/login.html"
  status = 302

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
